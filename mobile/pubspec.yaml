name: devsocio
description: "DevSocio — Where Developers Live Online. Flutter mobile client."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase (shares the devsocio-8f0c0 project with the web app)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Auth providers
  google_sign_in: ^6.2.1

  # State management + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Networking (Vercel /api/* endpoints) + utilities
  http: ^1.2.2
  intl: ^0.19.0
  timeago: ^3.7.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  share_plus: ^13.1.0
  firebase_messaging: ^15.2.10
  package_info_plus: ^10.1.0
  local_auth: ^3.0.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/devsocio_icon.png"
  adaptive_icon_background: "#6C63FF"
  adaptive_icon_foreground: "assets/icon/devsocio_fg.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
